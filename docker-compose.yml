# Tada Web — self-contained local e2e stack.
#   docker compose up  →  http://localhost:3000  →  Google sign-in  →  full hero flow.
# DB is a LOCAL Postgres (pgvector image), NOT cloud Neon. The app uses plain Prisma
# over a standard Postgres URL, so no driver toggle is needed — we just point
# DATABASE_URL/DIRECT_URL at the `db` container below.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tada
      POSTGRES_PASSWORD: tada
      POSTGRES_DB: tada
    # Host port mapping is only for external/debug access — the app reaches the DB
    # over the compose network at db:5432 regardless. Override DB_PORT if 5432 is
    # taken on the host (e.g. a local Postgres): DB_PORT=5433 docker compose up.
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - tada-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tada -d tada"]
      interval: 3s
      timeout: 3s
      retries: 30

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    # Live reload: bind-mount the working tree so `next dev` (Turbopack) hot-reloads
    # host edits instead of serving a frozen build-time COPY. The two anonymous
    # volumes shadow the bind mount so the container keeps its own Linux-built
    # node_modules (host macOS binaries would break) and an in-container .next.
    # (compose `environment:` still wins over the mounted .env/.env.local for the
    # DB URL, so the app talks to the `db` service, not localhost.)
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    # All secrets + cloud keys flow from the repo .env via env_file:
    #   GEMINI_API_KEY, OPENAI_API_KEY, BLOB_READ_WRITE_TOKEN, AUTH_SECRET,
    #   AUTH_GOOGLE_ID, AUTH_GOOGLE_SECRET  (gitignored; never baked into the image).
    # The `environment:` block below ONLY sets what must differ from .env, and
    # compose precedence (environment > env_file) makes those win — notably the
    # local DB URL replaces .env's Neon URL. We deliberately do NOT list the
    # secret/cloud keys here, so we never blank them out with an empty shell value.
    env_file:
      - path: ./.env
        required: false
    environment:
      # Local DB (overrides .env's Neon URL):
      DATABASE_URL: postgresql://tada:tada@db:5432/tada
      DIRECT_URL: postgresql://tada:tada@db:5432/tada
      NODE_ENV: development
      # No in-app allowlist: any Google account that completes OAuth is admitted
      # and gets plan='unlimited' (beta). Access is gated by the OAuth app's
      # "Testing" test-user list, not by env here.
      # Auth.js base URL. Canonical localhost:3000 = the registered Google redirect
      # (real Google sign-in works locally). Override AUTH_URL if you change the port.
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      # Chat compaction knobs (lib/chat/context.ts). Unset → code defaults (12 /
      # 66k). Lower them to exercise Layer-2 summarization locally, e.g.
      #   CHAT_RECENT_TAIL_MESSAGES=2 CHAT_SUMMARY_TRIGGER_TOKENS=30 docker compose up
      CHAT_RECENT_TAIL_MESSAGES: ${CHAT_RECENT_TAIL_MESSAGES:-}
      CHAT_SUMMARY_TRIGGER_TOKENS: ${CHAT_SUMMARY_TRIGGER_TOKENS:-}
    ports:
      # Canonical host port is 3000 (matches the Google OAuth redirect URI).
      # Google sign-in only works on 3000 (the registered redirect URI).
      - "${APP_PORT:-3000}:3000"

volumes:
  tada-pgdata:
